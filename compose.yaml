services:
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission-test
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./testdata/config:/config
      - ./testdata/downloads:/downloads
      - ./testdata/watch:/watch
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    restart: unless-stopped
